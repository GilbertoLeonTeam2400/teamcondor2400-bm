// ── Formateador UF: hasta 3 decimales, sin ceros finales, coma decimal ──────
function fmtUF(n) {
  if (n === null || n === undefined || isNaN(n)) return "0";
  var fixed = parseFloat(n.toFixed(3));
  var str = fixed.toString().replace(".", ",");
  return str;
}
// ── Formateador UF 2 dec: truncado (sin redondeo), sin ceros finales, coma ──
function fmtUF2(n) {
  if (n === null || n === undefined || isNaN(n)) return "0";
  var truncated = Math.floor(n * 100) / 100;
  var fixed = parseFloat(truncated.toFixed(2));
  var str = fixed.toString().replace(".", ",");
  return str;
}

function hoyStr() { return new Date().toLocaleDateString("es-CL"); }

function hoyInfo() {
  const now     = new Date();
  const start   = new Date(now.getFullYear(), now.getMonth(), 1);
  const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  let wd = 0;
  for (let d = new Date(start); d <= now; d.setDate(d.getDate() + 1)) {
    if (d.getDay() !== 0 && d.getDay() !== 6) wd++;
  }
  let wdLeft = 0;
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
  for (let d = new Date(tomorrow); d <= lastDay; d.setDate(d.getDate() + 1)) {
    if (d.getDay() !== 0 && d.getDay() !== 6) wdLeft++;
  }
  const calLeft = lastDay.getDate() - now.getDate();
  return {
    elapsed: wd, left: wdLeft, calLeft,
    mes: now.toLocaleString("es-CL", { month: "long", year: "numeric" }),
    dia: now.toLocaleDateString("es-CL", { weekday: "long", day: "numeric", month: "long" }),
    mesKey: now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0"),
  };
}

function motivDias(calLeft, wdLeft) {
  const sem = calLeft >= 14 ? "casi " + Math.round(calLeft/7) + " semanas completas!" :
              calLeft >= 7  ? "mas de 1 semana completa!" :
              calLeft >= 5  ? "una semana completa!" : "los dias finales!";

              calLeft >= 7  ? "Todavia podemos cerrar fuerte!" :
              calLeft >= 4  ? "El sprint final comienza AHORA!" : "Cada cierre vale DOBLE!";
  return "Aun tenemos " + calLeft + " dias (" + wdLeft + " habiles), eso es " + sem + " " + fr + " VAMOS CRACKS!";
}

function abrirCalendario(cliente) {
  if (!cliente.proxFecha || !cliente.proxAct) return;
  var titulo = encodeURIComponent("Gestion: " + cliente.nombre + " - " + (cliente.proxAct || ""));
  var nota   = encodeURIComponent("Cliente: " + cliente.nombre + (cliente.tel ? " / Tel: " + cliente.tel : "") + (cliente.plan ? " / Plan: " + cliente.plan : ""));
  // Format date for Google Calendar: YYYYMMDD
  var parts = cliente.proxFecha.split("-"); // input type date gives YYYY-MM-DD
  if (parts.length !== 3) return;
  var fecha = parts[0] + parts[1] + parts[2];
  var url = "https://calendar.google.com/calendar/render?action=TEMPLATE&text=" + titulo + "&dates=" + fecha + "T090000/" + fecha + "T100000&details=" + nota;
  window.open(url, "_blank");
}

function BorrarMesesView({ equipo, setEquipo, info, MESES_ORDEN, MESES_LABEL }) {
  var RD = "#C41230";
  // Build list of all months: los 6 meses dinámicos + mes actual
  var todosMeses = (function() {
    var lista = [];
    for (var i = 1; i <= 6; i++) {
      var d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
      var mk = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
      var lbl = d.toLocaleString("es-CL",{month:"long",year:"numeric"});
      lista.push({ mk: mk, label: lbl });
    }
    // Agregar mes actual al final
    lista.push({ mk: info.mesKey, label: info.mes + " (mes en curso)" });
    return lista;
  })();

  var [seleccionados, setSeleccionados] = useState({});
  var [borrando, setBorrando] = useState(false);
  var [borradoOk, setBorradoOk] = useState(false);
  var [borradoMsg, setBorradoMsg] = useState("");

  function toggleMes(mk) {
    setSeleccionados(function(prev) {
      var next = Object.assign({}, prev);
      next[mk] = !next[mk];
      return next;
    });
  }
  function seleccionarTodos() {
    var next = {};
    todosMeses.forEach(function(m) { next[m.mk] = true; });
    setSeleccionados(next);
  }
  function deseleccionarTodos() { setSeleccionados({}); }

  var mesesElegidos = todosMeses.filter(function(m) { return seleccionados[m.mk]; });

  function borrarSeleccionados() {
    if (mesesElegidos.length === 0) return;
    var nombres = mesesElegidos.map(function(m) { return m.label; }).join(", ");
    if (!window.confirm("¿Borrar los datos de: " + nombres + "?\nEsta acción no se puede deshacer.")) return;
    setBorrando(true);
    var mesTocarMesActual = seleccionados[info.mesKey];
    var nuevoEquipo = equipo.map(function(v) {
      var hist = Object.assign({}, v.historial || {});
      mesesElegidos.forEach(function(m) { delete hist[m.mk]; });
      var base = Object.assign({}, v, { historial: hist });
      if (mesTocarMesActual) { base.uf = 0; base.dps = 0; base.rep = []; }
      return base;
    });
    setEquipo(nuevoEquipo);
    var promises = mesesElegidos.map(function(m) {
      if (window.__fbDb && window.__fbDoc && window.__fbSetDoc) {
        if (m.mk === info.mesKey) {
          return window.__fbSetDoc(window.__fbDoc(window.__fbDb,"equipos",m.mk), {equipo: nuevoEquipo});
        } else {
          // Para meses anteriores, guardar equipo limpio de ese mes
          var limpio = nuevoEquipo.map(function(v) { return Object.assign({},v,{uf:0,dps:0,rep:[]}); });
          return window.__fbSetDoc(window.__fbDoc(window.__fbDb,"equipos",m.mk), {equipo: limpio});
        }
      }
      return Promise.resolve();
    });
    Promise.all(promises).then(function() {
      setBorrando(false);
      setBorradoOk(true);
      setBorradoMsg("✅ Datos borrados: " + nombres);
      setSeleccionados({});
      setTimeout(function() { setBorradoOk(false); setBorradoMsg(""); }, 5000);
    }).catch(function(e) {
      console.error("Error borrando:", e);
      setBorrando(false);
    });
  }

  return React.createElement("div", { style: { maxWidth: 560 } },
    React.createElement("div", { style: { fontSize: 15, fontWeight: 700, color: "#374151", marginBottom: 6 } }, "🗑️ Selecciona los meses a borrar"),
    React.createElement("div", { style: { fontSize: 13, color: "#6B7280", marginBottom: 16, lineHeight: 1.5 } },
      "Marca los meses que deseas limpiar. Se borrarán UF, DPS y reportes de esos meses para todo el equipo."
    ),
    React.createElement("div", { style: { display: "flex", gap: 8, marginBottom: 16 } },
      React.createElement("button", { onClick: seleccionarTodos, style: { padding: "6px 14px", fontSize: 12, fontWeight: 700, borderRadius: 8, border: "1.5px solid #E5E7EB", background: "#F9FAFB", cursor: "pointer", fontFamily: "inherit" } }, "Seleccionar todos"),
      React.createElement("button", { onClick: deseleccionarTodos, style: { padding: "6px 14px", fontSize: 12, fontWeight: 700, borderRadius: 8, border: "1.5px solid #E5E7EB", background: "#F9FAFB", cursor: "pointer", fontFamily: "inherit" } }, "Deseleccionar todos")
    ),
    React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 } },
      todosMeses.map(function(m) {
        var isActual = m.mk === info.mesKey;
        var sel = !!seleccionados[m.mk];
        return React.createElement("label", { key: m.mk, style: {
          display: "flex", alignItems: "center", gap: 12, padding: "12px 16px",
          borderRadius: 12, border: "2px solid " + (sel ? (isActual ? "#DC2626" : RD) : "#E5E7EB"),
          background: sel ? (isActual ? "#FEF2F2" : "#FFF0F2") : "#fff",
          cursor: "pointer", transition: "all .15s"
        }},
          React.createElement("input", { type: "checkbox", checked: sel, onChange: function() { toggleMes(m.mk); },
            style: { width: 18, height: 18, accentColor: RD, cursor: "pointer" }
          }),
          React.createElement("span", { style: { fontWeight: 700, fontSize: 14, color: isActual ? "#DC2626" : "#374151", flex: 1 } }, m.label),
          isActual && React.createElement("span", { style: { fontSize: 11, fontWeight: 700, color: "#DC2626", background: "#FEE2E2", borderRadius: 99, padding: "2px 10px" } }, "MES ACTUAL")
        );
      })
    ),
    borradoOk && React.createElement("div", { style: { background: "#DCFCE7", color: "#15803D", borderRadius: 10, padding: "12px 16px", fontSize: 13, fontWeight: 700, marginBottom: 14 } }, borradoMsg),
    React.createElement("button", {
      onClick: borrarSeleccionados,
      disabled: mesesElegidos.length === 0 || borrando,
      style: {
        width: "100%", padding: "14px", border: "none", borderRadius: 12, fontSize: 15, fontWeight: 700,
        cursor: mesesElegidos.length === 0 || borrando ? "not-allowed" : "pointer",
        background: mesesElegidos.length === 0 || borrando ? "#9CA3AF" : "#DC2626",
        color: "#fff", transition: "background .2s"
      }
    }, borrando ? "Borrando..." : mesesElegidos.length === 0 ? "Selecciona al menos un mes" : "🗑️ Borrar " + mesesElegidos.length + " mes(es) seleccionado(s)")
  );
}

  })();
  const MESES_LABEL = (function() {
    var labels = {};
    MESES_ORDEN.forEach(function(mk) {
      var parts = mk.split("-");
      var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, 1);
      var mes = d.toLocaleString("es-CL",{month:"short"});
      labels[mk] = mes.charAt(0).toUpperCase()+mes.slice(1)+" "+String(parts[0]).slice(2);

      var va = ((equipo[a].historial||{})[sortMes.key]||{})[sortMes.field]||0;
      var vb = ((equipo[b].historial||{})[sortMes.key]||{})[sortMes.field]||0;

    var file = e.target.files && e.target.files[0];

    var reader = new FileReader();

            var cols = lines2[i].split(",");

          if (!nombre || !mesKey2 || !/^\d{4}-\d{2}$/.test(mesKey2)) return;
          nuevoEquipo.forEach(function(v) {
            if (v.nombre.toUpperCase().indexOf(nombre) >= 0 || nombre.indexOf(v.nombre.toUpperCase()) >= 0) {
              var hist = v.historial;
              var mes = Object.assign({uf:0,dps:0,dpsVenta:0,conecta:0,hombres:0,mujeres:0}, hist[mesKey2]||{});

              cambios++;

          window.__fbSetDoc(window.__fbDoc(window.__fbDb,"equipos",info.mesKey),{equipo:nuevoEquipo});
        }
        setExcelOk(true);
        setExcelMsg("✅ Cargado correctamente. " + cambios + " registros actualizados. Verifica los datos en la tabla.");
      } catch(err) {
        setExcelMsg("❌ Error al leer el archivo: " + err.message);
      }
    };
    reader.onerror = function() { setExcelMsg("❌ No se pudo leer el archivo."); };
    if (file.name.endsWith(".csv")) {
      reader.readAsText(file);

        var script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";

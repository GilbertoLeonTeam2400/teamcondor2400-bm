// Ejecutar desde consola: window.recuperarDatos()
window.recuperarDatos = function() {
  if (!window.__fbDb || !window.__fbDoc || !window.__fbSetDoc || !window.__fbGetDoc) {
    console.error("Firebase no disponible"); return;
  }
  var mesKey = new Date().getFullYear() + "-" + String(new Date().getMonth()+1).padStart(2,"0");
  console.log("Recuperando datos para:", mesKey);
  // Leer el documento actual
  window.__fbGetDoc(window.__fbDoc(window.__fbDb,"equipos",mesKey)).then(function(snap) {
    var actual = snap.exists ? (snap.data() || {}) : {};
    var equipoActual = actual.equipo || [];
    console.log("Equipo actual en Firebase:", equipoActual.length, "miembros");
    // Reconstruir con EJECUTIVOS_BASE — preservar UF y datos del ejecutivo que quedó
    var reconstruido = EJECUTIVOS_BASE.map(function(base) {
      var existente = equipoActual.find(function(e){ return e && String(e.id) === String(base.id); });
      return Object.assign({rep:[], uf:0, dps:0, historial:{}}, base, existente || {});
    });
    console.log("Reconstruyendo equipo con", reconstruido.length, "miembros...");
    var metaSave = actual.metaEquipo && !isNaN(actual.metaEquipo) && actual.metaEquipo > 0 ? actual.metaEquipo : 550;
    window.__fbSetDoc(window.__fbDoc(window.__fbDb,"equipos",mesKey), {equipo: reconstruido, metaEquipo: metaSave})
      .then(function(){ 
        console.log("✅ DATOS RECUPERADOS. Recarga la página.");
        window.alert("✅ Datos recuperados. Recarga la página para ver el equipo completo.");
      })
      .catch(function(e){ console.error("Error:", e); });
  }).catch(function(e){ console.error("Error leyendo Firebase:", e); });
};

function fmtUF(n) {
  if (n === null || n === undefined || isNaN(n)) return "0";
  var fixed = parseFloat(n.toFixed(3));
  var str = fixed.toString().replace(".", ",");
  return str;
}
// ── Formateador UF 2 dec: truncado (sin redondeo), sin ceros finales, coma ──
function fmtUF2(n) {
  if (n === null || n === undefined || isNaN(n)) return "0";
  var truncated = Math.floor(n * 100) / 100;
  var fixed = parseFloat(truncated.toFixed(2));
  var str = fixed.toString().replace(".", ",");
  return str;
}

function hoyStr() { return new Date().toLocaleDateString("es-CL"); }

function hoyInfo() {
  const now     = new Date();
  const start   = new Date(now.getFullYear(), now.getMonth(), 1);
  const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  // Días hábiles transcurridos (incluyendo hoy)
  let wd = 0;
  for (let d = new Date(start); d <= now; d.setDate(d.getDate() + 1)) {
    if (d.getDay() !== 0 && d.getDay() !== 6) wd++;
  }
  // Días hábiles totales del mes (dinámico, no hardcodeado)
  let wdTotal = 0;
  for (let d = new Date(start); d <= lastDay; d.setDate(d.getDate() + 1)) {
    if (d.getDay() !== 0 && d.getDay() !== 6) wdTotal++;
  }
  let wdLeft = wdTotal - wd;
  const calLeft = lastDay.getDate() - now.getDate();
  // Semanas completas transcurridas (para semáforo de metas semanales)
  const semanasCompletadas = Math.floor(wd / 5); // 0,1,2,3,4
  const semanaActual = Math.ceil(wd / 5);         // 1,2,3,4
  return {
    elapsed: wd, left: wdLeft, calLeft,
    wdTotal,            // días hábiles reales del mes (reemplaza WD_MES fijo)
    semanasCompletadas, // cuántas semanas completas han pasado
    semanaActual,       // en qué semana estamos
    mes: now.toLocaleString("es-CL", { month: "long", year: "numeric" }),
    dia: now.toLocaleDateString("es-CL", { weekday: "long", day: "numeric", month: "long" }),
    mesKey: now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0"),
  };
}

function motivDias(calLeft, wdLeft) {
  const sem = calLeft >= 14 ? "casi " + Math.round(calLeft/7) + " semanas completas!" :
              calLeft >= 7  ? "mas de 1 semana completa!" :
              calLeft >= 5  ? "una semana completa!" : "los dias finales!";
  const fr  = calLeft >= 10 ? "Hay tiempo de sobra para lograrlo!" :
              calLeft >= 7  ? "Todavia podemos cerrar fuerte!" :
              calLeft >= 4  ? "El sprint final comienza AHORA!" : "Cada cierre vale DOBLE!";
  return "Aun tenemos " + calLeft + " dias (" + wdLeft + " habiles), eso es " + sem + " " + fr + " VAMOS CRACKS!";
}

function abrirCalendario(cliente) {
  if (!cliente.proxFecha || !cliente.proxAct) return;
  var titulo = encodeURIComponent("Gestion: " + cliente.nombre + " - " + (cliente.proxAct || ""));
  var nota   = encodeURIComponent("Cliente: " + cliente.nombre + (cliente.tel ? " / Tel: " + cliente.tel : "") + (cliente.plan ? " / Plan: " + cliente.plan : ""));
  // Format date for Google Calendar: YYYYMMDD
  var parts = cliente.proxFecha.split("-"); // input type date gives YYYY-MM-DD
  if (parts.length !== 3) return;
  var fecha = parts[0] + parts[1] + parts[2];
  var url = "https://calendar.google.com/calendar/render?action=TEMPLATE&text=" + titulo + "&dates=" + fecha + "T090000/" + fecha + "T100000&details=" + nota;
  window.open(url, "_blank");
}

function DpsReportView({ equipo, setEquipo, info, R, RD }) {
  var [msg, setMsg] = React.useState("");
  var [preview, setPreview] = React.useState([]);
  var [cargando, setCargando] = React.useState(false);

  function handleFile(e) {
    var file = e.target.files[0]; if(!file) return;
    setCargando(true); setMsg("⏳ Leyendo archivo...");
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var filas = [];
        if (window.XLSX) {
          var wb = window.XLSX.read(ev.target.result, {type:"binary"});
          // Buscar la pestaña "Resumen Agentes" específicamente
          var sheetName = wb.SheetNames.find(function(s){
            return s.toLowerCase().replace(/\s/g,"").indexOf("resumenagente") >= 0 ||
                   s.toLowerCase().replace(/\s/g,"").indexOf("agente") >= 0;
          }) || wb.SheetNames[0];
          console.log("[DPS] Pestaña usada:", sheetName, "| Disponibles:", wb.SheetNames);
          var ws = wb.Sheets[sheetName];
          filas = window.XLSX.utils.sheet_to_json(ws, {defval:""});
        }
        if (!filas.length) { setMsg("❌ No se encontraron datos."); setCargando(false); return; }

        // Mostrar columnas detectadas para debug
        var cols = Object.keys(filas[0]);
        console.log("[DPS] Columnas:", cols);

        // Filtrar solo CC=2400
        var miEquipo = filas.filter(function(f){
          var cc = String(f.CC||f.cc||f["C.C"]||f["CC."]||"").trim();
          return cc === "2400";
        });

        if (miEquipo.length === 0) {
          setMsg("⚠️ No se encontraron filas con CC=2400. Columnas detectadas: "+cols.slice(0,8).join(", "));
          setCargando(false); return;
        }

        // Mapear columnas del reporte de administración
        var mapeados = miEquipo.map(function(f){
          var nombre = String(
            f["NOMBRE EJECUTIVO"]||f["Nombre Ejecutivo"]||f.nombre||f.NOMBRE||""
          ).trim().toUpperCase();

          // Nombres exactos del reporte "Resumen Agentes" de administración
          var dpsConVenta  = parseInt(String(
            f["DPS c/ ven"]||f["DPS c/ven"]||f["DPS c/venta"]||f["DPS c/ venta"]||
            f["DPS_C_VENTA"]||f["DPS CON VENTA"]||"0")) || 0;
          var dpsSinVenta  = parseInt(String(
            f["DPS sin ven"]||f["DPS sin venta"]||f["DPS sin ven "]||
            f["DPS_SIN_VENTA"]||f["DPS SIN VENTA"]||"0")) || 0;
          var dpsPendiente = parseInt(String(
            f["DPS Pendien te"]||f["DPS Pendiente"]||f["DPS Pendien"]||f["DPS\nPendien\nte"]||
            f["DPS_PENDIENTE"]||f["DPS PENDIENTE"]||"0")) || 0;
          var dpsRechazado = parseInt(String(
            f["Rechaz adi"]||f["Rechaz"]||f["Rechazado"]||f["Rechaz\nadi"]||
            f["DPS Rechaz"]||f["DPS_RECHAZADO"]||f["DPS RECHAZADO"]||"0")) || 0;
          var dpsTotal     = parseInt(String(
            f["Total DP"]||f["Total DPS"]||f["TOTAL DPS"]||f["Total\nDP"]||
            f["total_dps"]||"0")) || 0;
          var uf = parseFloat(String(
            f["UF Dif"]||f["UF"]||f["uf"]||"0").replace(",",".")) || 0;

          return { nombre:nombre, dpsConVenta:dpsConVenta, dpsSinVenta:dpsSinVenta, dpsPendiente:dpsPendiente, dpsRechazado:dpsRechazado, dpsTotal:dpsTotal, uf:uf };
        }).filter(function(f){ return f.nombre.length > 0; });

        setPreview(mapeados);
        setMsg("✅ "+mapeados.length+" ejecutivos encontrados en CC=2400. Revisa la preview y confirma.");
        setCargando(false);
      } catch(err) {
        setMsg("❌ Error: "+err.message);
        setCargando(false);
      }
    };
    reader.onerror = function(){ setMsg("❌ No se pudo leer el archivo."); setCargando(false); };
    if (!window.XLSX) {
      var script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      script.onload = function(){ reader.readAsBinaryString(file); };
      document.head.appendChild(script);
    } else { reader.readAsBinaryString(file); }

function GestPremiosView({ premiosImgs, setPremiosImgs, info, R, RD, tablaPremios, setTablaPremios, premioConecta, setPremioConecta, TABLA_DEFAULT }) {
  var mesKey = info.mesKey;
  var mesLabel = new Date().toLocaleString("es-CL",{month:"long",year:"numeric"}).replace(/^./,function(c){return c.toUpperCase();});
  var [pendientes, setPendientes] = React.useState([]);
  var [guardando, setGuardando]   = React.useState(false);
  var [guardado,  setGuardado]    = React.useState(false);
  var [preview,   setPreview]     = React.useState(null); // imagen ampliada

  function agregarImagenes(e) {
    var files = Array.from(e.target.files); if(!files.length) return;
    var promises = files.map(function(file){
      return new Promise(function(res){
        var reader = new FileReader();
        reader.onload = function(ev){
          var img = new Image();
          img.onload = function(){
            // Comprimir agresivamente para respetar límite de 1MB de Firestore
            // Target: imagen ~90KB decoded, legible en pantalla
            var MAX=800,w=img.width,h=img.height;
            if(w>MAX||h>MAX){var sc=Math.min(MAX/w,MAX/h);w=Math.round(w*sc);h=Math.round(h*sc);}
            var canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            var dataUrl=canvas.toDataURL("image/jpeg",0.72);
            // Si aún es muy grande, comprimir más
            if(dataUrl.length > 200000) {
              var canvas2=document.createElement("canvas");
              canvas2.width=Math.round(w*0.7);canvas2.height=Math.round(h*0.7);
              canvas2.getContext("2d").drawImage(img,0,0,canvas2.width,canvas2.height);
              dataUrl=canvas2.toDataURL("image/jpeg",0.65);
            }
            res({id:Date.now()+Math.random(),data:dataUrl,nombre:file.name});
          };
          img.src=ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    });
    Promise.all(promises).then(function(nuevas){ setPendientes(pendientes.concat(nuevas)); });
  }

  function guardarTodo() {
    setGuardando(true);
    var todas = premiosImgs.concat(pendientes);
    setPremiosImgs(todas);
    setPendientes([]);
    try{ localStorage.setItem("PREMIOS_"+mesKey, JSON.stringify(todas)); }catch(e){}
    if(window.__fbDb&&window.__fbDoc&&window.__fbSetDoc){
      // Guardar cada imagen en doc separado para no superar 1MB por doc
      var saves = todas.map(function(img, i){
        return window.__fbSetDoc(
          window.__fbDoc(window.__fbDb,"equipos","premios_"+mesKey+"_img"+i),
          {img:img, orden:i, mes:mesKey, ts:Date.now()}
        );
      });
      // Guardar índice (sin data de imagen, solo referencia)
      saves.push(window.__fbSetDoc(
        window.__fbDoc(window.__fbDb,"equipos","premios_"+mesKey),
        {indice:todas.map(function(img,i){return {id:img.id,nombre:img.nombre,orden:i};}), total:todas.length, mes:mesKey, ts:Date.now()}
      ));
      Promise.all(saves)
        .then(function(){ setGuardando(false); setGuardado(true); setTimeout(function(){setGuardado(false);},3000); })
        .catch(function(e){ setGuardando(false); window.alert("Error al guardar: "+(e&&e.message?e.message:e)); });
    } else {
      setGuardando(false); setGuardado(true); setTimeout(function(){setGuardado(false);},3000);
    }
  }

  function saveTablaPremios(nuevaTabla) {
    setTablaPremios(nuevaTabla);
    try{ localStorage.setItem("TABLA_PREMIOS", JSON.stringify(nuevaTabla)); }catch(e){}
    if(window.__fbDb&&window.__fbDoc&&window.__fbSetDoc)
      window.__fbSetDoc(window.__fbDoc(window.__fbDb,"equipos","tabla_premios"),{tabla:nuevaTabla,ts:Date.now()}).catch(function(){});
  }

  function updateMonto(grupo, idx, valor) {
    var nueva = JSON.parse(JSON.stringify(tablaPremios));
    nueva[grupo][idx].monto = parseInt(valor)||0;
    saveTablaPremios(nueva);
  }

  function moverImg(idx, dir) {
    var arr = premiosImgs.concat(pendientes); // reorder all
    // Actually reorder only saved imgs

    var target = idx + dir;
    if(target < 0 || target >= newImgs.length) return;
    var tmp = newImgs[idx]; newImgs[idx] = newImgs[target]; newImgs[target] = tmp;
    setPremiosImgs(newImgs);
    try{ localStorage.setItem("PREMIOS_"+mesKey, JSON.stringify(newImgs)); }catch(e){}
    if(window.__fbDb&&window.__fbDoc&&window.__fbSetDoc)
      window.__fbSetDoc(window.__fbDoc(window.__fbDb,"equipos","premios_"+mesKey),{imgs:newImgs,mes:mesKey,ts:Date.now()}).catch(function(){});
  }

  function eliminar(id) {
    if(!window.confirm("¿Eliminar esta imagen?")) return;

        , React.createElement('img', { src:preview, style:{maxWidth:"92vw",maxHeight:"90vh",borderRadius:12,boxShadow:"0 8px 48px rgba(0,0,0,.6)"} })

        , "📷 Agregar imágenes"
        , React.createElement('input', { type:"file", accept:"image/png,image/jpeg,image/jpg", multiple:true, style:{display:"none"}, onChange:agregarImagenes })
      )
      , pendientes.length > 0 && React.createElement('div', { style:{fontSize:13,color:"#D97706",fontWeight:700} }, pendientes.length+" imagen(es) pendiente(s) de guardar")

 function App() {

    return Object.assign({}, v, { uf: parseFloat(d.uf)||0, dps: parseInt(d.dps)||0, rep: d.rep||[], historial: hist, metaUF: parseFloat(v.metaUF)||25 });
  }));

  const [sincronizado, setSincronizado] = useState(false);
  const [fbError,     setFbError]     = useState(false);

  META_UF = metaEquipo; // Sobreescribir la variable global con el estado
  const skipSnapshot = React.useRef(false);

  useEffect(function() {
    const key = info.mesKey;
    const storageKey = "equipo_" + info.mesKey;
    if (window.__fbDb && window.__fbDoc && window.__fbOnSnapshot) {
      const ref = window.__fbDoc(window.__fbDb, "equipos", key);
      var fbRespondio = false;

      // Cargar meses anteriores en window.__historialMeses (fuera del estado React)
      // para NO disparar el save useEffect
      function cargarHistorialMesesAnteriores() {
        if (!window.__fbGetDoc) return;
        window.__historialMeses = window.__historialMeses || {};
        var offsets = [1,2,3,4,5,6];
        var promises = offsets.map(function(offset) {
          var d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - offset);
          var mk = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
          var fbKey = mk;
          var ref2 = window.__fbDoc(window.__fbDb, "equipos", fbKey);
          return window.__fbGetDoc(ref2).then(function(snap2) {
            if (!snap2.exists) return;
            var data2 = snap2.data();
            if (!data2 || !Array.isArray(data2.equipo)) return;
            // Guardar en global indexado por ejecutivo id
            data2.equipo.forEach(function(vMes) {
              if (!(vMes.uf > 0)) return;
              if (!window.__historialMeses[String(vMes.id)]) window.__historialMeses[String(vMes.id)] = {};
              // Solo setear si no hay ya dato para ese mes
              if (!window.__historialMeses[String(vMes.id)][mk]) {
                window.__historialMeses[String(vMes.id)][mk] = { uf: vMes.uf, dps: vMes.dps||0 };
              }
            });
            console.log("[HISTORIAL] Cargado: " + mk);
          }).catch(function(){});
        });
        Promise.all(promises).then(function(){
          console.log("[HISTORIAL] Meses anteriores cargados OK");
          // Forzar re-render de UFLinealesView sin tocar el estado del equipo
          setSincronizado(function(v){ return v; });
        });
      }

      const unsub = window.__fbOnSnapshot(ref, function(snap) {
        fbRespondio = true;
        if (skipSnapshot.current) { skipSnapshot.current = false; setLoaded(true); setSincronizado(true); return; }
        if (snap.exists()) {
          const snapData = snap.data();
          const d = snapData.equipo;
          if (d && Array.isArray(d)) {
            var merged = d.map(function(v) {
              var excelHist = HISTORIAL_EXCEL[v.id] || HISTORIAL_EXCEL[String(v.id)] || {};
              var currentHist = v.historial || {};
              var mergedHist = Object.assign({}, excelHist, currentHist);
              return Object.assign({}, v, { historial: mergedHist });
            });
            console.log("[LOAD] Firebase datos recibidos OK");

              // Recalcular v.uf desde rep[] — fuente única de verdad

              var dpsDesdeReps = reps.reduce(function(s,r){return s+(parseInt(r.dps)||0);},0);
              // Si tiene reportes, usar suma de reps; si no, usar el valor guardado
              return Object.assign({rep:[]}, x, {
                uf:  reps.length > 0 ? ufDesdeReps : (parseFloat(x.uf)||0),
                dps: reps.length > 0 ? dpsDesdeReps : (parseInt(x.dps)||0),

function normalizarNombre(n) {
  // Normaliza nombre: elimina tildes, minúsculas, colapsa espacios
  return (n||"").trim().toUpperCase()
    .replace(/Á/g,"A").replace(/É/g,"E").replace(/Í/g,"I").replace(/Ó/g,"O").replace(/Ú/g,"U")
    .replace(/Ü/g,"U").replace(/Ñ/g,"N")
    .replace(/\s+/g," ");
}
function nombreCoincide(a, b) {

  var nb = normalizarNombre(b);

  var pa = na.split(" ").filter(function(w){ return w.length >= 4; });
  var pb = nb.split(" ").filter(function(w){ return w.length >= 4; });
  var coincidencias = pa.filter(function(w){ return pb.indexOf(w) >= 0; }).length;
  // Si el nombre más corto tiene solo 2 palabras largas (ej "MARCELA MERINO"),
  // necesita que AMBAS coincidan (100%). Si tiene 3+ palabras necesita 3 coincidencias.
  var minPalabras = Math.min(pa.length, pb.length);
  var minCoincidencias = minPalabras <= 2 ? minPalabras : 3;
  return coincidencias >= minCoincidencias;
}

    if (globalHist[mk] && globalHist[mk].uf > 0) return globalHist[mk].uf;

  }
  function buildMesLabel(offset) {

  var mes5Key        = buildMesKey(5);
  var mes6Key        = buildMesKey(6);

  function mesExistia(v, mesKey) {

              var hist = v.historial;

        if (window.__fbDb && window.__fbDoc && window.__fbSetDoc && window.__fbGetDoc) {

  function calcComision(uf) {
    if (uf <= 0)   return 0;
    if (uf < 18)   return 673750;                                        // < 18 UF = sueldo base sin comisión
    if (uf <= 27)  return Math.round(67986.2222 * uf + 3248);           // 18-27 UF
    if (uf <= 32)  return Math.round(63584.0    * uf + 122108);         // 27-32 UF
    if (uf <= 37)  return Math.round(79480.0    * uf - 386564);         // 32-37 UF
    if (uf <= 42)  return Math.round(119220.0   * uf - 1856944);        // 37-42 UF
    if (uf <= 52)  return Math.round(67970.4    * uf + 295539);         // 42-52 UF
    if (uf <= 62)  return Math.round(67045.6    * uf + 343629);         // 52-62 UF
    if (uf <= 72)  return Math.round(81632.0    * uf - 560728);         // 62-72 UF
    if (uf <= 82)  return Math.round(73454.0    * uf + 28088);          // 72-82 UF
    if (uf <= 92)  return Math.round(83880.0    * uf - 826844);         // 82-92 UF
    if (uf <= 102) return Math.round(59184.0    * uf + 1445188);        // 92-102 UF
    if (uf <= 115) return Math.round(66029.5385 * uf + 746943);         // 102-115 UF
    return Math.round(57686.0 * uf + 1706450);                          // > 115 UF
  }

  function fmt(n) { return Math.round(n).toLocaleString("es-CL",{style:"currency",currency:"CLP",minimumFractionDigits:0}); }

                  ? "0 8px 32px rgba(6,78,59,.3)"
                  : pct >= 0.5
                  ? "0 8px 32px rgba(120,53,15,.3)"
                  : "0 8px 32px rgba(127,29,29,.3)";
                var card2accent = pct >= 1 ? "#6EE7B7" : pct >= 0.5 ? "#FCD34D" : "#FCA5A5";
                var card2accentDim = pct >= 1 ? "rgba(110,231,183,.7)" : pct >= 0.5 ? "rgba(252,211,77,.7)" : "rgba(252,165,165,.7)";
                var card2border = pct >= 1 ? "rgba(110,231,183,.2)" : pct >= 0.5 ? "rgba(252,211,77,.2)" : "rgba(252,165,165,.2)";
                return React.createElement('div', { style:{background:card2bg,borderRadius:20,padding:"26px 24px",marginBottom:20,boxShadow:card2shadow} }

              , React.createElement('div', { style:{fontSize:12,color:card2accentDim,textTransform:"uppercase",letterSpacing:"0.2em",marginBottom:6} }, "📊 "+v.nombre.split(" ")[0]+" — día "+info.elapsed+"/"+info.wdTotal)
              , React.createElement('div', { style:{fontSize:17,fontWeight:900,color:card2accent,marginBottom:20} }, "¡Lo que ya llevas ganado, "+v.nombre.split(" ")[0]+"!")

              /* UF real grande */
              , React.createElement('div', { style:{textAlign:"center",marginBottom:20} }
                , React.createElement('div', { style:{fontSize:11,color:"rgba(255,255,255,.5)",textTransform:"uppercase",marginBottom:4} }, "UF cerradas este mes")
                , React.createElement('div', { style:{fontSize:"clamp(48px,12vw,72px)",fontWeight:900,color:card2accent,lineHeight:1} }, fmtUF2(ufReal))
                , React.createElement('div', { style:{fontSize:13,color:"rgba(255,255,255,.5)",marginTop:4} }, "de "+(v.metaPropia||v.metaUF||ufMeta)+" UF comprometidas · "+Math.round(pct*100)+"% logrado")
              )

              /* Desglose real */
              , React.createElement('div', { style:{background:"rgba(255,255,255,.06)",borderRadius:14,padding:"18px",marginBottom:16} }
                , React.createElement('div', { style:{fontSize:11,color:card2accentDim,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14} }, "💰 Remuneración actual")
                , React.createElement('div', { style:{display:"flex",flexDirection:"column",gap:8,marginBottom:16} }
                  , React.createElement('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center"} }
                    , React.createElement('span', { style:{fontSize:13,color:"rgba(255,255,255,.6)"} }, "Remuneración sin Premio")
                    , React.createElement('span', { style:{fontSize:14,fontWeight:800,color:"#fff"} }, fmt(comReal))
                  )
                  , React.createElement('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center"} }
                    , React.createElement('span', { style:{fontSize:13,color:"rgba(255,255,255,.6)"} }, "Premio antigüedad")
                    , React.createElement('span', { style:{fontSize:14,fontWeight:800,color:"#C9A84C"} }, premioReal>0 ? fmt(premioReal) : "Sin tramo aún")
                  )
                  , React.createElement('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center"} }
                    , React.createElement('span', { style:{fontSize:13,color:"rgba(255,255,255,.6)"} }, "Plan Conecta ("+conectaReal+" logrados)")
                    , React.createElement('span', { style:{fontSize:14,fontWeight:800,color:"#6EE7B7"} }, conectaReal>0 ? fmt(conectaReal*montoConUnitario) : "—")
                  )
                )
                , React.createElement('div', { style:{borderTop:"1px solid "+card2border,paddingTop:14,textAlign:"center"} }
                  , React.createElement('div', { style:{fontSize:11,color:card2accentDim,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:6} }, "🏆 TOTAL REMUNERACIÓN HOY")
                  , React.createElement('div', { style:{fontSize:"clamp(28px,7vw,42px)",fontWeight:900,color:card2accent,lineHeight:1} }, fmt(totalReal))
                )
              )

              /* Imagen del premio en Card 2 también */
              , imgPremio && React.createElement('div', { style:{borderRadius:12,overflow:"hidden",marginBottom:16,boxShadow:"0 4px 16px rgba(0,0,0,.4)"} }
                , React.createElement('img', { src:imgPremio.data||imgPremio, alt:"Premio", style:{width:"100%",display:"block",objectFit:"contain",background:"#fff",maxHeight:260} })
              )

              /* Texto de incentivo / tendencia */
              , React.createElement('div', { style:{background:"rgba(255,255,255,.07)",borderRadius:12,padding:"14px 16px",border:"1px solid "+card2border} }
                , React.createElement('div', { style:{fontSize:14,fontWeight:900,color:tendColor,marginBottom:4} }, tendTxt)
                , React.createElement('div', { style:{fontSize:12,color:"rgba(255,255,255,.6)"} },
                  info.left > 0
                    ? "Proyección al cierre: "+fmtUF2(proyFin)+" UF — quedan "+info.left+" días hábiles"
                    : "¡Mes completado!"
                )
              )

              /* Cerrar sesión */
              , React.createElement('button', { onClick:function(){setPinOk(false);setSelId("");setPinCal("");},
                  style:{width:"100%",padding:"12px",background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,fontSize:13,cursor:"pointer",fontWeight:600,marginTop:16,fontFamily:"inherit"} },
                  "Cerrar sesión")
            );
          })()
          );
        })()
    )
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
